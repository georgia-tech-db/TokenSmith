  - id: "snapshot_isolation_definition"
    question: "What is snapshot isolation?"
    expected_answer: "Snapshot isolation is a multiversion concurrency-control scheme where a transaction reads from a consistent snapshot taken at its start, while update transactions are validated so conflicting concurrent updates do not both commit."
    keywords: ["snapshot isolation", "multiversion", "consistent snapshot", "concurrent updates"]
