          grade: 2
    query_type: procedural
    history: []

  - id: "aries_redo_start"
    question: "How does ARIES determine where the REDO phase starts?"
    expected_answer: "During the analysis pass, ARIES finds the last complete checkpoint, reads its dirty-page table, and sets RedoLSN to the minimum RecLSN among dirty pages; if there are no dirty pages, RedoLSN is the checkpoint LSN."
    keywords: ["analysis pass", "RedoLSN", "RecLSN", "checkpoint", "dirty-page table"]
    similarity_threshold: 0.74
    retrieval_gold:
      chunks:
        - id: 1271
          grade: 3
