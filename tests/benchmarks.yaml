  - id: "snapshot_isolation_anomaly"
    question: "What anomaly can snapshot isolation still allow?"
    expected_answer: "Snapshot isolation can still allow nonserializable executions such as write skew, because transactions may read an old snapshot and commit updates that are individually valid but jointly inconsistent."
    keywords: ["snapshot isolation", "serializability", "write skew", "anomaly", "nonserializable"]
