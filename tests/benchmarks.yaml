  - id: "acid_properties"
    question: "What are the ACID properties of transactions?"
    expected_answer: "The ACID properties are atomicity, consistency, isolation, and durability: transactions must execute all-or-nothing, preserve consistency, behave as if isolated from concurrent transactions, and persist after successful completion even if the system crashes."
    keywords: ["atomicity", "consistency", "isolation", "durability", "ACID"]
    similarity_threshold: 0.76
    retrieval_gold:
