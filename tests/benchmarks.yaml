  - id: "conflict_serializable"
    question: "What makes a schedule conflict serializable?"
    expected_answer: "A schedule is conflict serializable if it is conflict equivalent to some serial schedule, meaning it can be transformed into a serial order by swapping only nonconflicting operations."
