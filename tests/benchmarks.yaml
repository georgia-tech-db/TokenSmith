  - id: "aries_undo_phase"
    question: "When and why does ARIES perform UNDO?"
    expected_answer: "ARIES performs UNDO after REDO for transactions that were incomplete at the time of the crash, so that partial effects of those uncommitted transactions are rolled back and atomicity is preserved."
    keywords: ["undo pass", "incomplete transactions", "atomicity", "rollback", "crash"]
