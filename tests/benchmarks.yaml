  - id: "lossless_decomposition"
    question: "When is a decomposition lossless?"
    expected_answer: "For a decomposition of R into R1 and R2 to be lossless, the shared attributes R1 ∩ R2 must functionally determine either R1 or R2, so the common attributes form a superkey of one of the decomposed relations."
