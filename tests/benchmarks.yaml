benchmarks:
  - id: "aries_recovery_goal"
    question: "What problem does ARIES solve in crash recovery?"
    expected_answer: "ARIES restores the database to a correct state after a crash by identifying incomplete transactions, redoing logged actions needed to reconstruct the pre-crash state, and undoing the effects of transactions that did not finish."
    keywords: ["ARIES", "crash recovery", "analysis", "redo", "undo", "incomplete transactions"]
    similarity_threshold: 0.72
    retrieval_gold:
      chunks:
