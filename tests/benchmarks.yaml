          grade: 2
    query_type: procedural
    history: []

  - id: "aries_redo_phase"
    question: "How does ARIES perform the REDO phase?"
    expected_answer: "ARIES repeats history during REDO: it scans forward from RedoLSN and reapplies an update only if the page is dirty, the log record is not older than the page's RecLSN, and the page's PageLSN shows that the update is not already reflected on disk."
    keywords: ["redo pass", "repeats history", "RedoLSN", "RecLSN", "PageLSN"]
    similarity_threshold: 0.76
    retrieval_gold:
      chunks:
