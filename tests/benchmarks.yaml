  - id: "write_ahead_logging_rule"
    question: "What does the write-ahead logging rule require before a modified page can be written to disk?"
    expected_answer: "Write-ahead logging requires the relevant log record, including the undo information, to reach stable storage before the corresponding modified database page is written to disk."
    keywords: ["write-ahead logging", "stable storage", "undo information", "modified page", "disk"]
