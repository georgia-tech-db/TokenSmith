embed_model: "models/Qwen3-Embedding-4B-Q5_K_M.gguf"
top_k: 10
num_candidates: 50
ensemble_method: "rrf"
ranker_weights: {"faiss":1,"bm25":0,"index_keywords":0}
rrf_k: 60
max_gen_tokens: 400
chunk_mode : "recursive_sections"
gen_model: "models/qwen2.5-3b-instruct-q8_0.gguf"
chunk_size: 2000
chunk_overlap: 200
use_hyde: false
hyde_max_tokens: 300
use_indexed_chunks: false
rerank_mode: "cross_encoder"
rerank_top_k: 5
use_double_prompt: false
enable_history: true
max_history_turns: 3

# Hardware acceleration
# device: "auto" detects the best backend at startup (recommended)
# Set to "cpu" to force CPU-only on any machine
# n_gpu_layers: -1 = all layers on GPU, 0 = CPU only (overridden by device: "auto")
# n_threads: null = auto-detect CPU thread count
device: "auto"
n_gpu_layers: -1
n_threads: null