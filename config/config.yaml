embed_model: "models/embedders/Qwen3-Embedding-4B-Q5_K_M.gguf"
embedding_model_context_window: 4096

top_k: 10
num_candidates: 50
ensemble_method: "rrf"
ranker_weights: {"faiss":0.7,"bm25":0,"index_keywords":0,"kg_node":0.1,"section_tree":0.1,"section_summary":0.1}
kg_graph_dir: "data/knowledge_graph/runs"
rrf_k: 60
max_gen_tokens: 400
chunk_mode: "recursive_sections"
gen_model: "models/generators/qwen2.5-3b-instruct-q8_0.gguf"
chunk_size_in_chars: 2000
chunk_overlap: 300
use_hyde: false
hyde_max_tokens: 300
use_indexed_chunks: false
rerank_mode: "cross_encoder"
rerank_top_k: 5
use_double_prompt: false
enable_history: true
max_history_turns: 3
enable_topic_extraction: false
semantic_cache_enabled: false
semantic_cache_bi_encoder_threshold: 0.90
semantic_cache_cross_encoder_threshold: 0.99
enable_topic_extraction: false
kg_pipeline:
  corpus_description: "Database System Concepts, 7th edition by Silberschatz et al."
  min_cooccurrence: 0
  top_n: 10
  canonicalization:
    llm_model: "openai/gpt-4o-mini"
    similarity_threshold: 0.78
    max_group_size: 30
    batch_size: 15
    embed_model: "sentence-transformers/all-MiniLM-L6-v2"
  summary_tree:
    summary_model: "openai/gpt-4o-mini"
    embed_model: "sentence-transformers/all-MiniLM-L6-v2"
    chunk_window: 3
