embed_model: "models/Qwen3-Embedding-4B-Q5_K_M.gguf"
top_k: 10
num_candidates: 50
ensemble_method: "rrf"
ranker_weights: {"faiss":1,"bm25":0,"index_keywords":0}
rrf_k: 60
max_gen_tokens: 400
chunk_mode : "recursive_sections"
gen_model: "models/qwen2.5-3b-instruct-q8_0.gguf"
chunk_size: 2000
chunk_overlap: 200
use_hyde: false
hyde_max_tokens: 300
use_indexed_chunks: false
rerank_mode: "cross_encoder"
rerank_top_k: 5
use_double_prompt: false
enable_history: false
max_history_turns: 3
enable_topic_extraction: true
disable_streaming: true

use_semantic_cache: true 
cache_capacity: 100 # this is the max entry count in the cache
cache_deviation: 0.25 # this is the D value in the paper
cache_alpha: 0.9 # this is the alpha value in the paper, how much to weigh the update of threshold