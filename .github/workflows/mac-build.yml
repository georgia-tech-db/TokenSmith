name: macOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-macos:
    name: Package macOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-runtime.txt
          PYTHON_ROOT="$(python -c 'import pathlib, sys; print(pathlib.Path(sys.executable).resolve().parents[1])')"
          mkdir -p app_runtime
          rsync -a --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            "$PYTHON_ROOT/" app_runtime/python/

      - name: Package macOS app
        run: npm run package:mac

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: TokenSmith-macos-${{ github.run_number }}
          path: release/TokenSmith-*-mac-*.dmg
          if-no-files-found: error

      - name: Publish macOS package to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            TokenSmith packages the desktop app for local study workflows.

            Major changes in this release:
            - Desktop app shell with Chat, Library, Models, and Settings views.
            - Local import support for PDFs, Markdown, text files, and folders.
            - Python-backed extraction, chunking, indexing, retrieval, and source-backed chat.
            - Bundled Python runtime in release packages for fewer setup steps.
            - Local model support and remote provider configuration.

            Platform assets are attached as their packaging workflows finish.
          files: release/TokenSmith-*-mac-*.dmg
