name: macOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-macos:
    name: Package macOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-runtime.txt
          PYTHON_ROOT="$(python -c 'import pathlib, sys; print(pathlib.Path(sys.executable).resolve().parents[1])')"
          mkdir -p app_runtime
          rsync -a --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            "$PYTHON_ROOT/" app_runtime/python/

      - name: Package macOS app
        run: npm run package:mac

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: TokenSmith-macos-${{ github.run_number }}
          path: release/TokenSmith-*-mac-*.dmg
          if-no-files-found: error

      - name: Publish macOS package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TokenSmith ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            TokenSmith ${{ github.ref_name }} packages the new Electron desktop app experience.

            Major changes:
            - TokenSmith-style desktop shell with Chat, Library, Models, and Settings.
            - Local material import for PDFs, Markdown, text files, and folders.
            - Python-backed extraction, chunking, indexing, retrieval, and source-backed chat.
            - Bundled Python runtime in release packages so students can run the app with fewer setup steps.
            - Optional GGUF/local model support plus remote model provider configuration.

            Assets for each platform are attached as their workflows finish. The Windows asset is a portable zip containing `TokenSmith.exe`.
          files: release/TokenSmith-*-mac-*.dmg
