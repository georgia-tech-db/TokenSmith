name: macOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package-macos:
    name: Package macOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-runtime.txt
          PYTHON_ROOT="$(python -c 'import pathlib, sys; print(pathlib.Path(sys.executable).resolve().parents[1])')"
          mkdir -p app_runtime
          rsync -a --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            "$PYTHON_ROOT/" app_runtime/python/

      - name: Package macOS app
        run: npm run package:mac

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: TokenSmith-macos-${{ github.run_number }}
          path: release/TokenSmith-*-mac-*.dmg
          if-no-files-found: error
