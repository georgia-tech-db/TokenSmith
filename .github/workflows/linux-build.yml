name: Linux Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-linux:
    name: Package Linux App
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system package tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev curl

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-runtime.txt
          PYTHON_ROOT="$(python -c 'import pathlib, sys; print(pathlib.Path(sys.executable).resolve().parents[1])')"
          mkdir -p app_runtime
          rsync -a --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            "$PYTHON_ROOT/" app_runtime/python/

      - name: Install AppImage tooling
        run: |
          curl -L \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o /tmp/appimagetool
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool

      - name: Package Linux app
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: npm run package:linux

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: TokenSmith-linux-${{ github.run_number }}
          path: |
            release/TokenSmith-*-linux-*.tar.gz
            release/TokenSmith-*-linux-*.AppImage
            release/tokensmith_*_*.deb
          if-no-files-found: error

      - name: Publish Linux packages to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            TokenSmith packages the desktop app for local study workflows.

            Major changes in this release:
            - Desktop app shell with Chat, Library, Models, and Settings views.
            - Local import support for PDFs, Markdown, text files, and folders.
            - Python-backed extraction, chunking, indexing, retrieval, and source-backed chat.
            - Bundled Python runtime in release packages for fewer setup steps.
            - Local model support and remote provider configuration.

            Platform assets are attached as their packaging workflows finish.
          files: |
            release/TokenSmith-*-linux-*.tar.gz
            release/TokenSmith-*-linux-*.AppImage
            release/tokensmith_*_*.deb
