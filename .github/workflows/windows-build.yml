name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-windows:
    name: Package Windows App
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python runtime
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-runtime.txt
          $pythonRoot = Split-Path -Parent (Get-Command python).Source
          New-Item -ItemType Directory -Force app_runtime | Out-Null
          robocopy $pythonRoot app_runtime/python /MIR /XD __pycache__ /XF *.pyc
          if ($LASTEXITCODE -gt 7) {
            exit $LASTEXITCODE
          }
          exit 0

      - name: Package Windows app
        run: npm run package:win

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: TokenSmith-windows-${{ github.run_number }}
          path: release/TokenSmith-*-win-*.zip
          if-no-files-found: error

      - name: Publish Windows package to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            TokenSmith packages the desktop app for local study workflows.

            Major changes in this release:
            - Desktop app shell with Chat, Library, Models, and Settings views.
            - Local import support for PDFs, Markdown, text files, and folders.
            - Python-backed extraction, chunking, indexing, retrieval, and source-backed chat.
            - Bundled Python runtime in release packages for fewer setup steps.
            - Local model support and remote provider configuration.

            Platform assets are attached as their packaging workflows finish.
          files: release/TokenSmith-*-win-*.zip
